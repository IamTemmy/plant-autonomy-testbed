# Plant Autonomy Testbed — Mosquitto broker configuration
#
# Adds a LAN-facing listener and requires authentication. Persistence
# and logging defaults come from /etc/mosquitto/mosquitto.conf and are
# intentionally not redefined here (re-declaring them produces a
# "Duplicate ... value" error and prevents the broker from starting).
#
# Installation target on the Pi: /etc/mosquitto/conf.d/plant-autonomy.conf

listener 1883 0.0.0.0

allow_anonymous false
password_file /etc/mosquitto/passwd
