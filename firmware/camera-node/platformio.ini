; Plant Autonomy Testbed — camera node (XIAO ESP32-S3 Sense) production firmware.
;
; v1 (DL-078): on a timer, capture a JPEG and HTTP POST it to the Pi image
; receiver (hub/09-camera), which stores it and computes greenness. Image bytes
; travel over HTTP; the MQTT capture event / presence is a later slice.
;
; Before building: copy src/secrets.h.example -> src/secrets.h and fill in real
; WiFi credentials. secrets.h is gitignored and must never be committed.
; Flash over a USB-C DATA cable (the XIAO auto-resets; port is /dev/cu.usbmodem*).

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
board_build.arduino.memory_type = qio_opi
