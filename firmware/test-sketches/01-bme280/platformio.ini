; Plant Autonomy Testbed — Phase 1 component test: BME280
;
; Builds an Arduino-framework sketch that reads the BME280 over I2C
; and prints temperature, humidity, pressure, and dew point at 1/2 Hz.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    adafruit/Adafruit BME280 Library@^2.2.4
    adafruit/Adafruit Unified Sensor@^1.1.14
