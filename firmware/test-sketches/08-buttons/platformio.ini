; Plant Autonomy Testbed — Phase 1 component test: Pushbuttons (with LED state indicators)
;
; Validates three pushbuttons by driving a small state machine. The LEDs
; validated in 07-feedback-io are reused here as visual state indicators —
; this also implicitly re-verifies the LEDs alongside their first real use case.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
