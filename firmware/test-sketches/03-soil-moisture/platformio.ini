; Plant Autonomy Testbed — Phase 1 component test: Capacitive soil moisture sensor
;
; Reads an analog soil moisture sensor on ADC1 (GPIO34) and prints
; raw ADC counts and the same value as a percentage of full scale.
; Used to record dry-air, dry-soil, and wet-soil reference readings
; for calibration.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
