; Plant Autonomy Testbed — Phase 1 component test: ESP32-CAM
;
; Validates the ESP32-CAM module (OV2640 camera) using the Espressif
; CameraWebServer example as a known-good baseline. Confirms the camera
; module is reachable, the board can connect to WiFi, and an HTTP-based
; video stream is reachable from any browser on the same LAN.

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
upload_speed = 115200

; FTDI USB-to-TTL adapter shows up at this device path on this dev machine.
; Confirmed with: ls /dev/cu.* | grep usbserial
upload_port = /dev/cu.usbserial-A5069RR4
monitor_port = /dev/cu.usbserial-A5069RR4

upload_flags =
    --before=no_reset
    --after=hard_reset

build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
