; Plant Autonomy Testbed — Phase 1 component test: Traffic-light status LEDs
;
; Validates the three status LEDs after the DL-044 rewire: green GPIO18,
; yellow GPIO19, red GPIO23, arranged top-to-bottom as red/yellow/green.
; Confirms each GPIO drives the LED in its intended physical position before
; the state machine (DL-046) relies on them. Uses the same pin values as the
; integrated config.h.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
