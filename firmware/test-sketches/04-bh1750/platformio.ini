; Plant Autonomy Testbed — Phase 1 component test: BH1750 light sensor
;
; Reads ambient light in lux from the BH1750 on the I2C bus shared with
; the BME280. Verifies sensor function and confirms multi-device I2C health.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    claws/BH1750@^1.3.0
