; Plant Autonomy Testbed — Phase 1 component test: Active buzzer (audible alarm)
;
; Validates the active buzzer in its intended role — sounding during a
; CRITICAL state. Reuses the LEDs and buttons validated in 07-feedback-io
; and 08-buttons. The buzzer is driven via an NPN transistor on GPIO4.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
