; Plant Autonomy Testbed — Phase 1 component test: Leak sensor
;
; Reads the DIYables water-detection PCB on ADC1 (GPIO39) and prints
; raw ADC counts plus percent of full scale at 2 Hz. Used to record
; dry-air and wet reference readings for the Phase 2 leak-trigger threshold.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
