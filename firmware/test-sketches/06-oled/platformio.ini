; Plant Autonomy Testbed — Phase 1 component test: SSD1306 OLED display
;
; Initializes a 128x64 SSD1306 OLED on the I2C bus shared with the BME280
; and BH1750, and displays a mock dashboard previewing the Phase 2 UI.
; Confirms display function and verifies three-device I2C bus integrity.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    adafruit/Adafruit GFX Library@^1.11.10
    adafruit/Adafruit SSD1306@^2.5.10
