; Plant Autonomy Testbed — Phase 1 component test: Float switch
;
; Reads the float switch as a digital input with internal pull-up,
; printing the state at 5 Hz. Used to determine which physical
; orientation corresponds to OPEN vs CLOSED for firmware logic.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
