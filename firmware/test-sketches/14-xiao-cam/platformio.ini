; Plant Autonomy Testbed — vision-node bring-up: XIAO ESP32-S3 Sense camera
;
; Proves the XIAO ESP32-S3 Sense (the camera node, DL-034) enumerates over its
; native USB-C and the camera (OV3660 here; OV2640 on older units) initializes
; and captures JPEG frames. No WiFi/SD/POST — just the board + camera, on one
; data cable. The XIAO auto-resets into the bootloader (no jumpers/buttons).
;
; PSRAM is 8MB OPI -> qio_opi memory type; USB CDC on boot for native serial.
; Port enumerates as /dev/cu.usbmodem* (a usbmodem, not the WROVER's usbserial);
; it can shift across resets — re-check with: ls /dev/cu.usbmodem*
; A power-only USB-C cable will NOT enumerate; use a data cable to flash.

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
board_build.arduino.memory_type = qio_opi
