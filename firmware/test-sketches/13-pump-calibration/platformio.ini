; Plant Autonomy Testbed — Phase 1 component test: Pump flow calibration
;
; Drives the real 12V peristaltic pump (GPIO25 via MOSFET, validated in
; 02-pump-mosfet) to measure flow rate (mL/s). Hold PRIME to fill the lines,
; then press RUN for a fixed timed dispense and measure the volume collected.
; Result feeds the daily water cap (relabel to mL) and the real-pump enable.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
