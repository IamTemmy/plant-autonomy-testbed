; Plant Autonomy Testbed — Phase 1 component test: Pump + MOSFET driver
;
; Drives an IRLB8721 N-channel MOSFET from GPIO25 to switch a 12V
; peristaltic pump on and off in a repeating cycle. Confirms gate-drive
; capability, flyback-diode behavior, and clean on/off transitions.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
