; Plant Autonomy Testbed — Bottom-Watering Calibration Harness (Phase 5 prototype)
; Standalone firmware. Drives the pump in controlled doses and publishes soil
; telemetry on the normal MQTT topics. See src/main.cpp header and the README.

[env:wrover]
platform = espressif32
board = esp-wrover-kit
framework = arduino

monitor_speed = 115200
upload_speed = 460800

; Same adapter as the integrated build. Update if your port differs.
upload_port = /dev/cu.usbserial-1140
monitor_port = /dev/cu.usbserial-1140

build_flags =
    -DBOARD_HAS_PSRAM

lib_ldf_mode = deep

; Only MQTT is needed here — this harness deliberately omits BME280/BH1750/OLED
; to keep the dependency and hardware-init surface minimal (the environment
; panels simply pause during a session; the watering panels stay live).
lib_deps =
    knolleary/PubSubClient@^2.8
